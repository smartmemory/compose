# TEAM PRESET: research
#
# Purpose:     Parallel exploration for cold-start discovery
# Pattern:     3 explorers (codebase, web, docs) → synthesize findings
# Capability:  codebase/docs use read-only-reviewer, web uses read-only-researcher
# Isolation:   none (read-only exploration)
# Merge:       Sequential synthesis step
#
# Use with:    compose build <feature-code> --team research
# Customize:   Copy to your project's pipelines/ as team-research.stratum.yaml and edit.

version: "0.3"

contracts:
  ExplorerFindings:
    sources: {type: string}
    patterns: {type: string}
    open_questions: {type: string}
  ResearchResult:
    codebase_findings: {type: string}
    web_findings: {type: string}
    docs_findings: {type: string}
    synthesis: {type: string}
    recommendations: {type: string}

flows:
  team-research:
    input:
      topic: {type: string}
      context: {type: string}
    output: ResearchResult
    steps:
      - id: codebase
        agent: "claude:read-only-reviewer"
        intent: >
          Explore the local codebase to understand how it relates to this topic.
          Find relevant files, patterns, existing implementations, and conventions.
          List sources with file:line references. Note patterns and open questions.
        inputs:
          topic: "$.input.topic"
          context: "$.input.context"
        output_contract: ExplorerFindings
        ensure:
          - "result.sources is not None"
        retries: 2

      - id: web
        agent: "claude:read-only-researcher"
        intent: >
          Search the web for information relevant to this topic. Look for:
          best practices, library documentation, similar implementations,
          known pitfalls, and recent developments.
          List sources with URLs. Note patterns and open questions.
        inputs:
          topic: "$.input.topic"
          context: "$.input.context"
        output_contract: ExplorerFindings
        ensure:
          - "result.sources is not None"
        retries: 2

      - id: docs
        agent: "claude:read-only-reviewer"
        intent: >
          Read local documentation (READMEs, design docs, specs, ADRs) to find
          information relevant to this topic. Check docs/, README.md, CLAUDE.md,
          and any linked specifications.
          List sources with file:line references. Note patterns and open questions.
        inputs:
          topic: "$.input.topic"
          context: "$.input.context"
        output_contract: ExplorerFindings
        ensure:
          - "result.sources is not None"
        retries: 2

      - id: synthesize
        agent: "claude:orchestrator"
        depends_on: [codebase, web, docs]
        intent: >
          Synthesize findings from three research passes (codebase, web, docs).
          Cross-reference sources. Identify consensus patterns and contradictions.
          Produce actionable recommendations for the feature implementation.
        inputs:
          codebase: "$.steps.codebase.output.sources"
          codebase_patterns: "$.steps.codebase.output.patterns"
          web: "$.steps.web.output.sources"
          web_patterns: "$.steps.web.output.patterns"
          docs: "$.steps.docs.output.sources"
          docs_patterns: "$.steps.docs.output.patterns"
        output_contract: ResearchResult
        ensure:
          - "result.synthesis != ''"
          - "result.recommendations != ''"
        retries: 2
