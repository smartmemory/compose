name: Publish Beta

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - '.gitignore'

jobs:
  publish-beta:
    runs-on: ubuntu-latest
    if: "!startsWith(github.event.head_commit.message, 'release:') && !startsWith(github.event.head_commit.message, 'chore: bump version')"
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Generate beta version
        id: version
        run: |
          CURRENT=$(node -p "require('./package.json').version")
          NPM_BETA=$(npm view @smartmemory/compose@beta version 2>/dev/null || echo "")
          echo "Current in package.json: $CURRENT"
          echo "Latest beta on npm: ${NPM_BETA:-none}"

          if [ -n "$NPM_BETA" ]; then
            NPM_BASE=$(echo "$NPM_BETA" | sed 's/-beta$//')
            PKG_BASE=$(echo "$CURRENT" | sed 's/-beta$//')
            if [ "$(printf '%s\n' "$NPM_BASE" "$PKG_BASE" | sort -V | tail -n1)" = "$NPM_BASE" ]; then
              BASE="$NPM_BASE"
            else
              BASE="$PKG_BASE"
            fi
          else
            BASE=$(echo "$CURRENT" | sed 's/-beta$//')
          fi

          MAJOR=$(echo "$BASE" | cut -d. -f1)
          MINOR=$(echo "$BASE" | cut -d. -f2)
          PATCH=$(echo "$BASE" | cut -d. -f3)
          NEW_PATCH=$((PATCH + 1))
          BETA_VERSION="${MAJOR}.${MINOR}.${NEW_PATCH}-beta"

          echo "current=$CURRENT" >> $GITHUB_OUTPUT
          echo "beta=$BETA_VERSION" >> $GITHUB_OUTPUT
          echo "Generated beta version: $BETA_VERSION (base was $BASE)"

      - name: Update version for beta
        env:
          BETA_VERSION: ${{ steps.version.outputs.beta }}
        run: |
          node -e "
          const fs = require('fs');
          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          pkg.version = process.env.BETA_VERSION;
          fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Install and build
        run: npm install && npm run build

      - name: Run tests
        run: npm test

      - name: Publish beta to npm
        run: npm publish --access public --tag beta --provenance --ignore-scripts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # No commit-back: the beta version is derived from `npm view @smartmemory/compose@beta`
      # (see "Generate beta version"), so npm is the source of truth. Pushing a bump commit
      # to main raced concurrent pushes and failed the job after a successful publish.

      - name: Summary
        env:
          BETA_VERSION: ${{ steps.version.outputs.beta }}
        run: |
          echo "## 🚀 Beta Published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** \`${BETA_VERSION}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Install with:" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "npm install -g @smartmemory/compose@beta" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
